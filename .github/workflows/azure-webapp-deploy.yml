name: Deploy Fullstack to Azure Web App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_WEBAPP_NAME: mc-cc-eca-tddgen-dev-api
  NODE_VERSION: "22"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build

      - name: Build frontend for bundled hosting
        env:
          VITE_API_URL: ""
        run: pnpm --filter @workspace/tdd-generator run build

      - name: Bundle frontend into API package
        run: |
          rm -rf artifacts/api-server/public
          mkdir -p artifacts/api-server/public
          cp -R artifacts/tdd-generator/dist/. artifacts/api-server/public/

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: artifacts/api-server
