name: Build, Push & Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER || 'testregistry1995.azurecr.io' }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'unifiedportal' }}
  CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME || 'test1995' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'Rishi_RG' }}
  IMAGE_TAG: sha-${{ github.sha }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || '8ad36948-f6b5-432b-891e-fae3bef2ab46' }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || '9c9a6bbd-df99-43a4-98d7-52e97f641574' }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image.outputs.uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image URI
        id: image
        run: echo "uri=${ACR_LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          target: runtime
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push

    steps:
      - name: Log in to Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Azure Container Apps
        run: |
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${{ needs.build_and_push.outputs.image_ref }}"
