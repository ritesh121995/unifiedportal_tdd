name: Build, Push & Deploy to Azure Container Apps

  on:
    push:
      branches: [main]
    workflow_dispatch:

  permissions:
    contents: read
    id-token: write

  env:
    ACR_LOGIN_SERVER: testregistry1995.azurecr.io
    IMAGE_NAME: unifiedportal
    CONTAINER_APP_NAME: test1995
    RESOURCE_GROUP: Rishi_RG

  jobs:
    build-and-push:
      runs-on: ubuntu-latest
      outputs:
        image-tag: ${{ steps.meta.outputs.version }}

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Log in to Azure Container Registry
          uses: docker/login-action@v3
          with:
            registry: ${{ env.ACR_LOGIN_SERVER }}
            username: ${{ secrets.ACR_USERNAME }}
            password: ${{ secrets.ACR_PASSWORD }}

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Extract metadata (tags & labels)
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}
            tags: |
              type=sha,prefix=sha-
              type=raw,value=latest,enable={{is_default_branch}}

        - name: Build and push Docker image
          uses: docker/build-push-action@v5
          with:
            context: .
            file: ./Dockerfile
            platforms: linux/amd64
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max

    deploy:
      runs-on: ubuntu-latest
      needs: build-and-push

      steps:
        - name: Log in to Azure (OIDC)
          uses: azure/login@v2
          with:
            client-id: ${{ secrets.AZURE_CLIENT_ID }}
            tenant-id: 8ad36948-f6b5-432b-891e-fae3bef2ab46
            subscription-id: 9c9a6bbd-df99-43a4-98d7-52e97f641574

        - name: Deploy to Azure Container Apps
          uses: azure/container-apps-deploy-action@v1
          with:
            registryUrl: ${{ env.ACR_LOGIN_SERVER }}
            registryUsername: ${{ secrets.ACR_USERNAME }}
            registryPassword: ${{ secrets.ACR_PASSWORD }}
            containerAppName: ${{ env.CONTAINER_APP_NAME }}
            resourceGroup: ${{ env.RESOURCE_GROUP }}
            imageToDeploy: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag
  }}
