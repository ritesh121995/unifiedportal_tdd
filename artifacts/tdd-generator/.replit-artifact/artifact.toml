kind = "web"
previewPath = "/"
title = "Azure TDD Generator"
version = "1.0.0"
id = "artifacts/tdd-generator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18825

[services.development]
run = "pnpm --filter @workspace/tdd-generator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tdd-generator", "run", "build" ]
publicDir = "artifacts/tdd-generator/dist"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18825"
BASE_PATH = "/"
